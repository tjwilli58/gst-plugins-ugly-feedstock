schema_version: 1

context:
  version: "1.28.4"

package:
  name: gst-plugins-ugly
  version: ${{ version }}

source:
  url: https://gstreamer.freedesktop.org/src/gst-plugins-ugly/gst-plugins-ugly-${{ version }}.tar.xz
  sha256: 5486cd145c5af43259fd37caca59d048e2a67ddb07082ea8f50ef0f02a85f8a5

build:
  number: 0

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ stdlib('c') }}
    - pkg-config
    - meson
    - ninja
    - gettext-tools
  host:
    - if: linux
      then:
        - libgl-devel
        - libegl-devel
        - libdrm
        - libxcb
        - pthread-stubs
        - xorg-libxext
        - expat
        - xorg-libxfixes
        - xorg-libx11
        - xorg-libxrender
        - xorg-libxdamage
        - xorg-libxxf86vm
        - xorg-libxau
        - xorg-xorgproto
    - libiconv
    - if: not linux
      then: libintl-devel
    - gstreamer         ==${{ version }}
    - gst-plugins-base  ==${{ version }}
    - gobject-introspection
    - glib
    - x264
    - zlib
  run:
    # We want to pin harder than the run_export from gstreamer
    - gstreamer         =${{ version }}
  run_exports:
    - ${{ pin_subpackage('gst-plugins-ugly', upper_bound='x.x') }}

tests:
  - script:
      - if: unix
        then:
          - test -f $PREFIX/lib/gstreamer-1.0/libgstasf${SHLIB_EXT}
          - test -f $PREFIX/lib/gstreamer-1.0/libgstdvdlpcmdec${SHLIB_EXT}
          - test -f $PREFIX/lib/gstreamer-1.0/libgstdvdsub${SHLIB_EXT}
          - test -f $PREFIX/lib/gstreamer-1.0/libgstrealmedia${SHLIB_EXT}
          - test -f $PREFIX/lib/gstreamer-1.0/libgstx264${SHLIB_EXT}
      - if: win
        then:
          - if not exist %LIBRARY_LIB%\\gstreamer-1.0\\gstasf.dll exit 1
          - if not exist %LIBRARY_LIB%\\gstreamer-1.0\\gstdvdlpcmdec.dll exit 1
          - if not exist %LIBRARY_LIB%\\gstreamer-1.0\\gstdvdsub.dll exit 1
          - if not exist %LIBRARY_LIB%\\gstreamer-1.0\\gstrealmedia.dll exit 1
          - if not exist %LIBRARY_LIB%\\gstreamer-1.0\\gstx264.dll exit 1
      - gst-inspect-1.0 --plugin x264

about:
  license: LGPL-2.1-or-later
  license_file: COPYING
  summary: GStreamer Ugly Plug-ins
  homepage: http://gstreamer.freedesktop.org/
  repository: https://gitlab.freedesktop.org/gstreamer/gst-plugins-ugly

extra:
  recipe-maintainers:
    - yishai1999
    - tjwilli58
    - scopatz
    - kuepe-sl
    - hmaarrfk
